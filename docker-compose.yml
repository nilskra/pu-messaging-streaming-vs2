services:
  mysql:
    image: mysql:8.4
    container_name: vs2-mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpw
      MYSQL_USER: app
      MYSQL_PASSWORD: apppw
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-prootpw"]
      interval: 5s
      timeout: 5s
      retries: 20

  redpanda:
    image: redpandadata/redpanda:v24.3.7
    container_name: vs2-redpanda
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "1"
      - --memory
      - "1G"
      - --reserve-memory
      - "0M"
      - --node-id
      - "0"
      - --check=false
      - --kafka-addr
      - "PLAINTEXT://0.0.0.0:9092"
      - --advertise-kafka-addr
      - "PLAINTEXT://redpanda:9092"
      - --pandaproxy-addr
      - "0.0.0.0:8082"
      - --advertise-pandaproxy-addr
      - "redpanda:8082"
    ports:
      - "9092:9092"
      - "8082:8082"

  console:
    image: redpandadata/console:v2.7.2
    container_name: vs2-redpanda-console
    environment:
      KAFKA_BROKERS: "redpanda:9092"
    ports:
      - "8088:8080"
    depends_on:
      - redpanda

  blogbackend:
    image: ghcr.io/nilskra/pu-messaging-streaming-vs2-blogbackend:1.0.1
    container_name: vs2-blogbackend
    environment:
      QUARKUS_PROFILE: prod
      DB_JDBC_URL: "jdbc:mysql://mysql:3306/blogdb"
      DB_USERNAME: "app"
      DB_PASSWORD: "apppw"
      KAFKA_BOOTSTRAP_SERVERS: "redpanda:9092"
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
      redpanda:
        condition: service_started

  validator:
    image: ghcr.io/nilskra/pu-messaging-streaming-vs2-validator:1.0.2
    container_name: vs2-validator
    environment:
      KAFKA_BOOTSTRAP_SERVERS: "redpanda:9092"
    ports:
      - "8081:8081"
    depends_on:
      redpanda:
        condition: service_started

volumes:
  mysql_data: