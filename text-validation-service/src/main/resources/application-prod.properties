############################
# HTTP
############################
quarkus.http.host=0.0.0.0
quarkus.http.port=8081

############################
# DATASOURCE (MySQL)
############################
quarkus.datasource.db-kind=mysql
quarkus.datasource.jdbc.url=${DB_JDBC_URL}
quarkus.datasource.username=${DB_USERNAME}
quarkus.datasource.password=${DB_PASSWORD}

# Connection pool (optional but recommended)
quarkus.datasource.jdbc.max-size=16

############################
# HIBERNATE
############################
quarkus.hibernate-orm.database.generation=update
quarkus.hibernate-orm.log.sql=false

############################
# KAFKA / REDPANDA
############################
kafka.bootstrap.servers=${KAFKA_BOOTSTRAP_SERVERS}

############################
# INCOMING (Requests)
############################
mp.messaging.incoming.validation-requests.connector=smallrye-kafka
mp.messaging.incoming.validation-requests.topic=blog-validation-request
mp.messaging.incoming.validation-requests.auto.offset.reset=earliest
mp.messaging.incoming.validation-requests.value.deserializer=org.apache.kafka.common.serialization.StringDeserializer

############################
# OUTGOING (Responses)
############################
mp.messaging.outgoing.validation-responses.connector=smallrye-kafka
mp.messaging.outgoing.validation-responses.topic=blog-validation-response
mp.messaging.outgoing.validation-responses.value.serializer=org.apache.kafka.common.serialization.StringSerializer

############################
# OPTIONAL: LOGGING
############################
quarkus.log.level=INFO